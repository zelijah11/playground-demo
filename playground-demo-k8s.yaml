apiVersion: apps/v1
kind: Deployment
metadata:
  name: playground-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: playground-demo
  template:
    metadata:
      labels:
        app: playground-demo
    spec:
      containers:
      - name: playground-demo
        image: 100.125.202.56:30500/playground-demo:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: playground-demo-service
spec:
  type: NodePort
  selector:
    app: playground-demo
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30090
